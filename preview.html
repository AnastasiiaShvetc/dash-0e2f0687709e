<style>
  :root{
    --bg:#f3f1fb; --card:#ffffff; --ink:#2b2540; --muted:#8a83a6;
    --teal:#8fe0d3; --teal2:#6fd6c8; --blue:#9cc2f5; --blue2:#7fb3f0;
    --pink:#f7b6cf; --pink2:#f4a6c0; --purple:#c3b0f0; --purple2:#b9a3e3;

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(180deg,#efeafb 0%,#f3f1fb 30%);color:var(--ink);
    padding:14px 14px 40px;max-width:520px;margin:0 auto;}
  h1{font-size:20px;margin:2px 0 2px;font-weight:700}
  .sub{color:var(--muted);font-size:13px;margin-bottom:14px}
  .weekbar{display:flex;align-items:center;justify-content:space-between;
    background:var(--card);border-radius:18px;padding:10px 12px;box-shadow:var(--shadow);margin-bottom:14px}
  .weekbar .nav{width:38px;height:38px;border:none;border-radius:12px;background:#f0ecfb;color:var(--purple2);
    font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .weekbar .nav:disabled{opacity:.35;cursor:default}
  .weekbar .center{text-align:center;line-height:1.2}
  .weekbar .center b{font-size:15px}
  .weekbar .center span{display:block;color:var(--muted);font-size:12px}
  .refresh{width:100%;border:none;border-radius:14px;padding:12px;margin-bottom:16px;cursor:pointer;
    background:linear-gradient(90deg,var(--purple2),var(--blue2));color:#fff;font-size:14px;font-weight:600;box-shadow:var(--shadow)}
  .refresh:active{transform:scale(.99)}
  .tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .tile{border-radius:18px;padding:14px;color:#fff;box-shadow:var(--shadow)}
  .tile .t-label{font-size:12px;opacity:.9}
  .tile .t-val{font-size:22px;font-weight:700;margin-top:4px}
  .tile .t-delta{font-size:11px;opacity:.95;margin-top:2px}
  .t-teal{background:linear-gradient(135deg,var(--teal),var(--teal2))}
  .t-blue{background:linear-gradient(135deg,var(--blue),var(--blue2))}
  .t-pink{background:linear-gradient(135deg,var(--pink),var(--pink2))}
  .t-purple{background:linear-gradient(135deg,var(--purple),var(--purple2))}
  .card{background:var(--card);border-radius:20px;padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
  .card h2{font-size:16px;margin:0 0 10px;display:flex;align-items:center;gap:8px}
  .big{font-size:28px;font-weight:700}
  .row{display:flex;align-items:center;justify-content:space-between;margin:6px 0;font-size:14px}
  .muted{color:var(--muted)}
  .coach{background:#f5f2fe;border-radius:14px;padding:10px 12px;margin-top:12px;font-size:13px;line-height:1.45;color:#4a4266}
  .coach b{color:var(--purple2)}
  .hof{list-style:none;padding:0;margin:8px 0 0}
  .hof li{background:linear-gradient(90deg,#fff6e6,#fdeefb);border-radius:12px;padding:9px 12px;margin-bottom:7px;font-size:13.5px;display:flex;gap:8px;align-items:center}
  .donut-wrap{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .donut{width:132px;height:132px;border-radius:50%;flex:0 0 auto;position:relative}
  .donut::after{content:"";position:absolute;inset:20px;background:var(--card);border-radius:50%}
  .donut .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2}
  .donut .center b{font-size:20px}.donut .center span{font-size:10px;color:var(--muted)}
  .legend{flex:1;min-width:150px}
  .legend .li{display:flex;align-items:center;gap:7px;font-size:12.5px;margin:3px 0}
  .legend .dot{width:10px;height:10px;border-radius:3px;flex:0 0 auto}
  .legend .cnt{margin-left:auto;font-weight:600;color:var(--muted)}
  .other-tag{margin-top:10px;font-size:12.5px;color:var(--muted)}
  .bar{margin:9px 0}
  .bar .lbl{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
  .bar .track{height:9px;background:#eee6fb;border-radius:6px;overflow:hidden}
  .bar .fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--purple2),var(--blue2))}
  .bar.zero .lbl b{color:var(--bad)}
  .flag{background:#fdeef1;color:var(--bad);border-radius:10px;padding:8px 10px;font-size:12.5px;margin-top:8px}
  .delta-up{color:var(--good);font-weight:600}
  .delta-down{color:var(--bad);font-weight:600}
  .charts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
  .chartbox{background:#faf8ff;border-radius:14px;padding:10px}
  .chartbox .ctitle{font-size:12px;color:var(--muted);margin-bottom:4px}
  svg{display:block;width:100%;height:auto}
  .emo{margin:10px 0}
  .emo .top{display:flex;justify-content:space-between;font-size:13.5px}
  .emo .meta{font-size:12px;color:var(--muted);margin-top:2px}
  .emo .int{height:6px;background:#eee6fb;border-radius:4px;margin-top:5px;overflow:hidden}
  .emo .int i{display:block;height:100%;background:linear-gradient(90deg,var(--pink2),var(--coral))}
  .pat{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .pat .col{background:#faf8ff;border-radius:14px;padding:10px}
  .pat .col h4{margin:0 0 6px;font-size:13px}
  .pat .col.pos h4{color:var(--good)} .pat .col.neg h4{color:var(--bad)}
  .pat .col div{font-size:12.5px;margin:3px 0;color:#4a4266}
  .pat .col .c{color:var(--muted)}
  .step{background:linear-gradient(90deg,#eafaf3,#eef3fe);border-radius:14px;padding:12px;margin-top:10px;font-size:13.5px}
  .step b{display:block;margin-bottom:3px;color:var(--good)}
  .note{text-align:center;color:var(--muted);font-size:11px;margin-top:6px}
</style>

  };
  var weeks = [], idx = 0;

  function delta(cur, prev, dp){
    var d = cur - prev; if(Math.abs(d) < 1e-9) return '<span class="muted">без изменений</span>';
    var up = d > 0; var val = (up?'↑ +':'↓ ') + (dp!=null? d.toFixed(dp): d);
    return '<span class="'+(up?'delta-up':'delta-down')+'">'+val+'</span>';
  }
  function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;');}

  function lineChart(vals, min, max, color){
    var w=140,h=54,pad=6, n=vals.length;
    var pts = vals.map(function(v,i){
      var x = pad + (w-2*pad)*(i/(n-1));
      var y = h-pad - (h-2*pad)*((v-min)/(max-min));
      return x.toFixed(1)+','+y.toFixed(1);
    });
    var last = pts[pts.length-1].split(',');
    return '<svg viewBox="0 0 '+w+' '+h+'">'
      + '<polyline fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" points="'+pts.join(' ')+'"/>'
      + '<circle cx="'+last[0]+'" cy="'+last[1]+'" r="3.2" fill="'+color+'"/></svg>';
  }

  function donut(spheres){
    var total = spheres.reduce(function(s,x){return s+x.count;},0) || 1;
    var acc = 0, segs = [];
    spheres.forEach(function(s){
      var frac = s.count/total, start = acc*360, end = (acc+frac)*360; acc += frac;
      if(s.count>0) segs.push((SPHERE_COLORS[s.name]||'#ccc')+' '+start.toFixed(1)+'deg '+end.toFixed(1)+'deg');
    });
    if(!segs.length) segs.push('#eee 0deg 360deg');
    return 'background:conic-gradient('+segs.join(',')+')';
  }

    H+='<div class="tiles">'
      +'<div class="tile t-purple"><div class="t-label">🧭 Фокус на цель</div><div class="t-val">'+c.focus+'%</div><div class="t-delta">'+delta(c.focus,c.focus_prev,0)+' к прошлой</div></div>'
      +'<div class="tile t-teal"><div class="t-label">🏆 Задач за неделю</div><div class="t-val">'+p.total+'</div><div class="t-delta">'+esc(p.tempo)+'</div></div>'
      +'<div class="tile t-blue"><div class="t-label">🌡️ Настроение</div><div class="t-val">'+(st.mood>0?'+':'')+st.mood+'</div><div class="t-delta">'+delta(st.mood,st.mood_prev,1)+'</div></div>'
      +'<div class="tile t-pink"><div class="t-label">🔋 Энергия</div><div class="t-val">'+st.energy+'/10</div><div class="t-delta">'+delta(st.energy,st.energy_prev,1)+'</div></div>'
      +'</div>';

    var hof = p.hall_of_fame.map(function(x){return '<li>⭐ '+esc(x)+'</li>';}).join('');
    H+='<div class="card"><h2>🏆 Победы недели</h2>'
      +'<div class="row"><span class="muted">Выполнено задач</span><span class="big">'+p.total+'</span></div>'
      +'<div class="muted" style="font-size:13px">Темп: '+esc(p.tempo)+'</div>'
      +'<div style="font-size:13px;font-weight:600;margin-top:10px">Зал славы недели</div><ul class="hof">'+hof+'</ul>'
      +'<div class="coach">🧠 '+esc(p.coach)+'</div></div>';

    var legend = wh.spheres.map(function(s){
      return '<div class="li"><span class="dot" style="background:'+(SPHERE_COLORS[s.name]||'#ccc')+'"></span>'
        + s.emoji+' '+esc(s.name)+'<span class="cnt">'+s.count+'</span></div>';
    }).join('');
    var other = wh.other.map(function(o){return esc(o.name)+' — '+o.count;}).join(' · ');
    var wtotal = wh.spheres.reduce(function(s,x){return s+x.count;},0);
    H+='<div class="card"><h2>⚖️ Колесо баланса</h2><div class="donut-wrap">'
      +'<div class="donut" style="'+donut(wh.spheres)+'"><div class="center"><b>'+wtotal+'</b><span>задач</span></div></div>'
      +'<div class="legend">'+legend+'</div></div>'
      +'<div class="other-tag">◼️ Всё остальное: '+other+'</div>'
      +'<div class="coach">🧠 '+esc(wh.coach)+'</div></div>';

    var maxScore = Math.max.apply(null, c.directions.map(function(d){return d.score;}).concat([1]));
    var bars = c.directions.map(function(d){
      var pct = Math.round(d.score/maxScore*100);
      var zero = d.score===0;
      return '<div class="bar'+(zero?' zero':'')+'"><div class="lbl"><span>'+d.emoji+' '+esc(d.name)+'</span><b>'+d.score+(zero?' ⚠️':'')+'</b></div>'
        +'<div class="track"><div class="fill" style="width:'+(zero?3:pct)+'%"></div></div></div>';
    }).join('');
    H+='<div class="card"><h2>🧭 Компас: цели и саботаж</h2>'
      +'<div class="row"><span class="muted">Фокус на 4 направления</span><span><b class="big">'+c.focus+'%</b> &nbsp;'+delta(c.focus,c.focus_prev,0)+'</span></div>'
      +bars
      +'<div class="flag">🌀 Ловушка занятости: '+c.avoidance_days+' дн. → '+esc(c.avoidance_where)+'</div>'
      +'<div class="coach">🧠 '+esc(c.coach)+'</div></div>';

    H+='<div class="card"><h2>🌡️ Состояние</h2>'
      +'<div class="row"><span class="muted">Настроение (ср.)</span><span><b>'+(st.mood>0?'+':'')+st.mood+'</b> '+delta(st.mood,st.mood_prev,1)+'</span></div>'
      +'<div class="row"><span class="muted">Энергия (ср.)</span><span><b>'+st.energy+'/10</b> '+delta(st.energy,st.energy_prev,1)+'</span></div>'
      +'<div class="row"><span class="muted">Дней восстановления</span><b>'+st.recovery_days+' / 7</b></div>'
      +'<div class="charts">'
      +'<div class="chartbox"><div class="ctitle">Настроение · 7 дней</div>'+lineChart(st.mood_curve,-5,5,'#7fb3f0')+'</div>'
      +'<div class="chartbox"><div class="ctitle">Энергия · 7 дней</div>'+lineChart(st.energy_curve,1,10,'#f4a6c0')+'</div>'
      +'</div><div class="coach">🧠 '+esc(st.coach)+'</div></div>';

    var emos = em.top.map(function(e){
      return '<div class="emo"><div class="top"><b>'+esc(e.name)+'</b><span class="muted">×'+e.count+' · сила '+e.intensity+'/5</span></div>'
        +'<div class="meta">'+esc(e.trigger)+' · '+esc(e.body)+'</div>'
        +'<div class="int"><i style="width:'+(e.intensity/5*100)+'%"></i></div></div>';
    }).join('');
    H+='<div class="card"><h2>💗 Эмоции недели</h2>'+emos+'<div class="coach">🧠 '+esc(em.coach)+'</div></div>';

    var charge = pt.charge.map(function(x){return '<div>⚡ '+esc(x.name)+' <span class="c">×'+x.count+'</span></div>';}).join('');
    var drain = pt.drain.map(function(x){return '<div>🪫 '+esc(x.name)+' <span class="c">×'+x.count+'</span></div>';}).join('');
    H+='<div class="card"><h2>🔋 Паттерны</h2><div class="pat">'
      +'<div class="col pos"><h4>Заряжало</h4>'+charge+'</div>'
      +'<div class="col neg"><h4>Разряжало</h4>'+drain+'</div></div>'
      +(pt.coach?'<div class="coach">🧠 '+esc(pt.coach)+'</div>':'')+'</div>';

    H+='<div class="card"><h2>🌱 Вывод и шаг</h2><div style="font-size:14px;line-height:1.5">'+esc(cn.text)+'</div>'
      +'<div class="step"><b>Шаг на следующую неделю</b>'+esc(cn.step)+'</div></div>';

    document.getElementById('app').innerHTML = H;
    window.scrollTo(0,0);
  }

  function load(){ weeks = DATA.weeks; idx = weeks.length - 1; render(); }
  document.getElementById('prev').onclick = function(){ if(idx>0){idx--;render();} };
  document.getElementById('next').onclick = function(){ if(idx<weeks.length-1){idx++;render();} };
  document.getElementById('refresh').onclick = load;
  load();
</script>
</body>
</html>
