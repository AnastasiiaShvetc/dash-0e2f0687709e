<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Мой недельный срез · Оми (превью)</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{--card:#fff;--ink:#20304d;--muted:#6b7a94;--good:#1f7a52;--bad:#c23a58;--neu:#7a8699;--shadow:0 8px 22px rgba(60,90,150,.12)}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(180deg,#F0F3FA 0%,#DCE6F5 100%);color:var(--ink);
    padding:14px 14px 40px;max-width:520px;margin:0 auto}
  h1{font-size:20px;margin:2px 0;font-weight:700}
  .sub{color:var(--muted);font-size:13px;margin-bottom:14px}
  .weekbar{display:flex;align-items:center;justify-content:space-between;background:var(--card);border-radius:18px;padding:10px 12px;box-shadow:var(--shadow);margin-bottom:14px}
  .weekbar .nav{width:38px;height:38px;border:none;border-radius:12px;background:#E1E9F6;color:#395886;font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .weekbar .nav:disabled{opacity:.35;cursor:default}
  .weekbar .center b{font-size:15px}
  .weekbar .center{text-align:center;line-height:1.2}
  .weekbar .center span{display:block;color:var(--muted);font-size:12px}
  .refresh{width:100%;border:none;border-radius:14px;padding:12px;margin-bottom:16px;cursor:pointer;background:linear-gradient(90deg,#638ECB,#8AAEE0);color:#fff;font-size:14px;font-weight:600;box-shadow:var(--shadow)}
  .tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .tile{border-radius:18px;padding:14px;color:#1f3557;box-shadow:var(--shadow)}
  .tile .t-label{font-size:12px;color:#3a537d;font-weight:500}
  .tile .t-val{font-size:23px;font-weight:700;margin-top:4px;color:#183055}
  .tile .t-delta{font-size:11.5px;margin-top:3px;color:#274063;font-weight:600}
  .t-purple{background:#B1C9EF}.t-teal{background:#C9D8F0}.t-blue{background:#D5DEEF}.t-pink{background:#E3EBF7}
  .card{background:var(--card);border-radius:20px;padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
  .card h2{font-size:16px;margin:0 0 10px;display:flex;align-items:center;gap:8px}
  .big{font-size:28px;font-weight:700}
  .row{display:flex;align-items:center;justify-content:space-between;margin:6px 0;font-size:14px}
  .muted{color:var(--muted)}
  .coach{background:#EAF1FB;border-radius:14px;padding:11px 13px;margin-top:12px;font-size:13px;line-height:1.5;color:#2c3d5c}
  .coach b{color:#395886}
  .hof{list-style:none;padding:0;margin:8px 0 0}
  .hof li{background:#EAF1FB;border-radius:12px;padding:9px 12px;margin-bottom:7px;font-size:13.5px;display:flex;gap:8px;align-items:center}
  .donut-wrap{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .donut{width:132px;height:132px;border-radius:50%;flex:0 0 auto;position:relative}
  .donut::after{content:"";position:absolute;inset:20px;background:var(--card);border-radius:50%}
  .donut .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2}
  .donut .center b{font-size:20px}.donut .center span{font-size:10px;color:var(--muted)}
  .legend{flex:1;min-width:150px}
  .legend .li{display:flex;align-items:center;gap:7px;font-size:12.5px;margin:3px 0}
  .legend .dot{width:10px;height:10px;border-radius:3px;flex:0 0 auto}
  .legend .cnt{margin-left:auto;font-weight:600;color:var(--muted)}
  .other-tag{margin-top:10px;font-size:12.5px;color:var(--muted)}
  .bar{margin:9px 0}
  .bar .lbl{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
  .bar .track{height:9px;background:#DCE6F5;border-radius:6px;overflow:hidden}
  .bar .fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#638ECB,#8AAEE0)}
  .bar.zero .lbl b{color:var(--bad)}
  .flag{background:#FBE9EC;color:var(--bad);border-radius:10px;padding:8px 10px;font-size:12.5px;margin-top:8px}
  .delta-up{color:var(--good);font-weight:700}
  .delta-down{color:var(--bad);font-weight:700}
  .charts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
  .chartbox{background:#F1F5FC;border-radius:14px;padding:10px}
  .chartbox .ctitle{font-size:12px;color:var(--muted);margin-bottom:4px}
  .chartcap{font-size:11px;color:var(--muted);margin-top:6px;text-align:center}
  svg{display:block;width:100%;height:auto}
  .emo{margin:10px 0}
  .emo .top{display:flex;justify-content:space-between;font-size:13.5px}
  .emo .meta{font-size:12px;color:var(--muted);margin-top:2px}
  .emo .int{height:7px;background:#E7ECF4;border-radius:4px;margin-top:5px;overflow:hidden}
  .emo .int i{display:block;height:100%}
  .emap{margin-top:12px;border-top:1px solid #E7ECF4;padding-top:10px}
  .emap-t{font-size:12.5px;font-weight:600;margin-bottom:6px;color:#3a537d}
  .emap-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:5px 0}
  .emap-lbl{font-size:11px;color:var(--muted);min-width:82px}
  .chip{font-size:12px;border-radius:20px;padding:3px 9px;white-space:nowrap}
  .plinks{margin-bottom:10px}
  .plink{display:flex;align-items:center;gap:6px;font-size:12.5px;padding:7px 10px;border-radius:10px;margin-bottom:6px;background:#F1F5FC}
  .plink.pos{border-left:3px solid var(--good)}
  .plink.neg{border-left:3px solid var(--bad)}
  .plink .parrow{color:var(--muted)}
  .plink .pe{color:#3a4c6b}
  .pat{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .pat .col{background:#F1F5FC;border-radius:14px;padding:10px}
  .pat .col h4{margin:0 0 6px;font-size:13px}
  .pat .col.pos h4{color:var(--good)}.pat .col.neg h4{color:var(--bad)}
  .pat .col div{font-size:12.5px;margin:3px 0;color:#33445f}
  .pat .col .c{color:var(--muted)}
  .step{background:#E8F3EE;border-radius:14px;padding:12px;margin-top:10px;font-size:13.5px;line-height:1.5}
  .step b{display:block;margin-bottom:3px;color:var(--good)}
  .stub{background:var(--card);border-radius:20px;padding:30px 20px;text-align:center;box-shadow:var(--shadow)}
  .stub .e{font-size:34px}.stub p{color:var(--muted);font-size:14px}
</style>
</head>
<body>
  <h1>Мой недельный срез</h1>
  <div class="sub">Итоги недели с Оми 🤍 <b>(превью с примерами)</b></div>
  <div class="weekbar">
    <button class="nav" id="prev">‹</button>
    <div class="center"><b id="wk-range">—</b><span id="wk-id"></span></div>
    <button class="nav" id="next">›</button>
  </div>
  <button class="refresh" id="refresh">🔄 Обновить данные</button>
  <div id="app"></div>
<script>
  var SPHERE_COLORS={"Работа":"#7fb3f0","Своё дело":"#b9a3e3","Авторство":"#f4a6c0","Отдых/заземление":"#6fd6c8","Отношения":"#f6a6a6","Здоровье":"#a9e5a0","Яркость":"#ffd98a","Саморазвитие":"#cbb8f4"};
  var weeks=[],idx=0;
  function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
  function delta(cur,prev,dp){var d=cur-prev;if(Math.abs(d)<1e-9)return '<span class="muted">без изменений</span>';var up=d>0;return '<span class="'+(up?'delta-up':'delta-down')+'">'+(up?'↑ +':'↓ ')+(dp!=null?Math.abs(d).toFixed(dp):Math.abs(d))+'</span>';}
  function vcol(v){return v==='pos'?'#1f7a52':v==='neg'?'#c23a58':'#7a8699';}
  function vbg(v){return v==='pos'?'#E6F3EC':v==='neg'?'#FBE9EC':'#EDEFF3';}
  function chart(vals){
    var w=150,h=64,pad=9,mn=0,mx=10,mid=5,n=vals.length;
    function X(i){return pad+(w-2*pad)*(i/(n-1));}
    function Y(v){return h-pad-(h-2*pad)*((v-mn)/(mx-mn));}
    var ym=Y(mid).toFixed(1);
    var s='<svg viewBox="0 0 '+w+' '+h+'">';
    s+='<line x1="'+pad+'" y1="'+ym+'" x2="'+(w-pad)+'" y2="'+ym+'" stroke="#c2cfe4" stroke-width="1" stroke-dasharray="3 3"/>';
    s+='<text x="0" y="'+(Y(mid)-2).toFixed(1)+'" font-size="7" fill="#9aa6bd">5</text>';
    for(var i=0;i<n-1;i++){
      var xa=X(i),ya=vals[i],xb=X(i+1),yb=vals[i+1],pts=[[xa,ya]];
      if((ya-mid)*(yb-mid)<0){var t=(mid-ya)/(yb-ya);pts.push([xa+(xb-xa)*t,mid]);}
      pts.push([xb,yb]);
      for(var j=0;j<pts.length-1;j++){var a=pts[j],b=pts[j+1];var above=((a[1]+b[1])/2)>=mid;
        s+='<line x1="'+a[0].toFixed(1)+'" y1="'+Y(a[1]).toFixed(1)+'" x2="'+b[0].toFixed(1)+'" y2="'+Y(b[1]).toFixed(1)+'" stroke="'+(above?'#1f7a52':'#c23a58')+'" stroke-width="2.6" stroke-linecap="round"/>';}
    }
    for(var k=0;k<n;k++){var v=vals[k];s+='<circle cx="'+X(k).toFixed(1)+'" cy="'+Y(v).toFixed(1)+'" r="2.5" fill="'+(v>=mid?'#1f7a52':'#c23a58')+'"/>';}
    return s+'</svg>';
  }
  function donut(sp){var total=sp.reduce(function(s,x){return s+x.count;},0)||1,acc=0,segs=[];
    sp.forEach(function(s){var f=s.count/total,a=acc*360,b=(acc+f)*360;acc+=f;if(s.count>0)segs.push((SPHERE_COLORS[s.name]||'#ccc')+' '+a.toFixed(1)+'deg '+b.toFixed(1)+'deg');});
    if(!segs.length)segs.push('#eee 0deg 360deg');return 'background:conic-gradient('+segs.join(',')+')';}

  function render(){
    var wk=weeks[idx];
    document.getElementById('wk-range').textContent=wk.range;
    document.getElementById('wk-id').textContent='Неделя '+wk.id.split('-W')[1];
    document.getElementById('prev').disabled=(idx===0);
    document.getElementById('next').disabled=(idx===weeks.length-1);
    var p=wk.pobedy,wh=wk.wheel,c=wk.compass,st=wk.state,em=wk.emotions,pt=wk.patterns,cn=wk.conclusion,H='';

    H+='<div class="tiles">'
      +'<div class="tile t-purple"><div class="t-label">🧭 Фокус на цель</div><div class="t-val">'+c.focus+'%</div><div class="t-delta">'+delta(c.focus,c.focus_prev,0)+' к прошлой</div></div>'
      +'<div class="tile t-teal"><div class="t-label">🏆 Задач за неделю</div><div class="t-val">'+p.total+'</div><div class="t-delta">'+esc(p.tempo)+'</div></div>'
      +'<div class="tile t-blue"><div class="t-label">🌡️ Настроение</div><div class="t-val">'+st.mood.toFixed(1)+'</div><div class="t-delta">'+delta(st.mood,st.mood_prev,1)+' · шкала 0–10</div></div>'
      +'<div class="tile t-pink"><div class="t-label">🔋 Энергия</div><div class="t-val">'+st.energy.toFixed(1)+'/10</div><div class="t-delta">'+delta(st.energy,st.energy_prev,1)+'</div></div>'
      +'</div>';

    var hof=p.hall_of_fame.map(function(x){return '<li>⭐ '+esc(x)+'</li>';}).join('');
    H+='<div class="card"><h2>🏆 Победы недели</h2><div class="row"><span class="muted">Выполнено задач</span><span class="big">'+p.total+'</span></div>'
      +'<div class="muted" style="font-size:13px">Темп: '+esc(p.tempo)+'</div>'
      +'<div style="font-size:13px;font-weight:600;margin-top:10px">Зал славы недели</div><ul class="hof">'+hof+'</ul>'
      +'<div class="coach">🧠 '+esc(p.coach)+'</div></div>';

    var legend=wh.spheres.map(function(s){return '<div class="li"><span class="dot" style="background:'+(SPHERE_COLORS[s.name]||'#ccc')+'"></span>'+s.emoji+' '+esc(s.name)+'<span class="cnt">'+s.count+'</span></div>';}).join('');
    var other=wh.other.map(function(o){return esc(o.name)+' — '+o.count;}).join(' · ');
    var wtot=wh.spheres.reduce(function(s,x){return s+x.count;},0);
    H+='<div class="card"><h2>⚖️ Колесо баланса</h2><div class="donut-wrap"><div class="donut" style="'+donut(wh.spheres)+'"><div class="center"><b>'+wtot+'</b><span>задач</span></div></div><div class="legend">'+legend+'</div></div>'
      +'<div class="other-tag">◼️ Всё остальное: '+other+'</div><div class="coach">🧠 '+esc(wh.coach)+'</div></div>';

    var ms=Math.max.apply(null,c.directions.map(function(d){return d.score;}).concat([1]));
    var bars=c.directions.map(function(d){var z=d.score===0;return '<div class="bar'+(z?' zero':'')+'"><div class="lbl"><span>'+d.emoji+' '+esc(d.name)+'</span><b>'+d.score+(z?' ⚠️':'')+'</b></div><div class="track"><div class="fill" style="width:'+(z?3:Math.round(d.score/ms*100))+'%"></div></div></div>';}).join('');
    H+='<div class="card"><h2>🧭 Компас: цели и саботаж</h2><div class="row"><span class="muted">Фокус на 4 направления</span><span><b class="big">'+c.focus+'%</b> &nbsp;'+delta(c.focus,c.focus_prev,0)+'</span></div>'+bars
      +'<div class="flag">🌀 Ловушка занятости: '+c.avoidance_days+' дн. → '+esc(c.avoidance_where)+'</div><div class="coach">🧠 '+esc(c.coach)+'</div></div>';

    H+='<div class="card"><h2>🌡️ Состояние</h2>'
      +'<div class="row"><span class="muted">Настроение (ср.)</span><span><b>'+st.mood.toFixed(1)+' / 10</b> '+delta(st.mood,st.mood_prev,1)+'</span></div>'
      +'<div class="row"><span class="muted">Энергия (ср.)</span><span><b>'+st.energy.toFixed(1)+' / 10</b> '+delta(st.energy,st.energy_prev,1)+'</span></div>'
      +'<div class="row"><span class="muted">Дней восстановления</span><b>'+st.recovery_days+' / 7</b></div>'
      +'<div class="charts"><div class="chartbox"><div class="ctitle">Настроение · 7 дней</div>'+chart(st.mood_curve)+'</div><div class="chartbox"><div class="ctitle">Энергия · 7 дней</div>'+chart(st.energy_curve)+'</div></div>'
      +'<div class="coach">🧠 '+esc(st.coach)+'</div></div>';

    var tops=em.top.map(function(e){return '<div class="emo"><div class="top"><b>'+esc(e.name)+'</b><span class="muted">×'+e.count+' · сила '+e.intensity+'/5</span></div><div class="meta">'+esc(e.trigger)+' · '+esc(e.body)+'</div><div class="int"><i style="width:'+(e.intensity/5*100)+'%;background:'+vcol(e.valence)+'"></i></div></div>';}).join('');
    var groups=[['pos','Позитивные'],['neu','Нейтральные'],['neg','Негативные']];
    var emap=groups.map(function(g){var list=em.all.filter(function(x){return x.valence===g[0];});if(!list.length)return '';var chips=list.map(function(x){return '<span class="chip" style="background:'+vbg(x.valence)+';color:'+vcol(x.valence)+'">'+esc(x.name)+' ·'+x.count+'</span>';}).join('');return '<div class="emap-row"><span class="emap-lbl">'+g[1]+'</span>'+chips+'</div>';}).join('');
    H+='<div class="card"><h2>💗 Эмоции недели</h2>'+tops+'<div class="emap"><div class="emap-t">Карта всех эмоций недели</div>'+emap+'</div><div class="coach">🧠 '+esc(em.coach)+'</div></div>';

    var plinks=(pt.links||[]).map(function(l){return '<div class="plink '+esc(l.dir)+'"><span class="pc">'+esc(l.cause)+'</span><span class="parrow">→</span><span class="pe">'+esc(l.effect)+'</span></div>';}).join('');
    var ch=pt.charge.map(function(x){return '<div><span style="color:#1f7a52">▲</span> '+esc(x.name)+' <span class="c">×'+x.count+'</span></div>';}).join('');
    var dr=pt.drain.map(function(x){return '<div><span style="color:#c23a58">▼</span> '+esc(x.name)+' <span class="c">×'+x.count+'</span></div>';}).join('');
    H+='<div class="card"><h2>🔋 Паттерны</h2><div class="plinks">'+plinks+'</div><div class="pat"><div class="col pos"><h4>Заряжало</h4>'+ch+'</div><div class="col neg"><h4>Разряжало</h4>'+dr+'</div></div>'
      +(pt.coach?'<div class="coach">🧠 '+esc(pt.coach)+'</div>':'')+'</div>';

    H+='<div class="card"><h2>🌱 Вывод и шаг</h2><div style="font-size:14px;line-height:1.5">'+esc(cn.text)+'</div><div class="step"><b>Шаг на следующую неделю</b>'+esc(cn.step)+'</div></div>';

    document.getElementById('app').innerHTML=H;window.scrollTo(0,0);
  }
  function stub(m){document.getElementById('app').innerHTML='<div class="stub"><div class="e">🌙</div><p>'+esc(m||'Данные не загрузились')+'<br>Нажми «Обновить данные» через пару секунд.</p></div>';}
  var DATA={
  "weeks": [
    {
      "id": "2026-W26",
      "range": "22–28 июня",
      "pobedy": {
        "total": 33,
        "tempo": "неровный, с перегрузом в среду",
        "hall_of_fame": [
          "Начала набросок новой главы",

        ],
        "coach": "Неделя была рваной: много мелких дел, мало крупных вех. Ты больше держалась на плаву, чем двигалась."
      },
      "wheel": {

          {

          },
          {

        ],
        "other": [
          {

          }
        ],
        "coach": "Сильный перекос в работу и быт. Пять из восьми сфер почти пусты — жизнь сузилась к рутине."
      },
      "compass": {

        "directions": [
          {

        "coach": "Честно: 4 дня из 7 — уход в быт вместо главного. Отношения и путешествия по нулям. Это неделя избегания."
      },

      },
